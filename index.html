<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POK＆ASバフシミュレーター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            background-color: #d0ebff;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.15) 0%, transparent 45%),
                repeating-linear-gradient(45deg, rgba(56, 189, 248, 0.03) 0px, rgba(56, 189, 248, 0.03) 20px, transparent 20px, transparent 40px);
            background-attachment: fixed;
        }
        
        .btn-3d {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 9999px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: all 0.1s ease;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            user-select: none;
        }
        .btn-3d:active {
            transform: translateY(3px);
        }
        
        .btn-red { background: linear-gradient(to bottom, #ff7e7e, #ff4d4d); color: white; box-shadow: 0 4px 0 #cc2929, 0 6px 10px rgba(0, 0, 0, 0.2); }
        .btn-red:active { box-shadow: 0 1px 0 #cc2929, 0 2px 4px rgba(0, 0, 0, 0.15); }
        .btn-green { background: linear-gradient(to bottom, #a3e635, #84cc16); color: white; box-shadow: 0 4px 0 #4d7c0f, 0 6px 10px rgba(0, 0, 0, 0.2); }
        .btn-green:active { box-shadow: 0 1px 0 #4d7c0f, 0 2px 4px rgba(0, 0, 0, 0.15); }
        .btn-emerald { background: linear-gradient(to bottom, #34d399, #059669); color: white; box-shadow: 0 4px 0 #047857, 0 6px 10px rgba(0, 0, 0, 0.2); }
        .btn-emerald:active { box-shadow: 0 1px 0 #047857, 0 2px 4px rgba(0, 0, 0, 0.15); }
        .btn-blue { background: linear-gradient(to bottom, #60a5fa, #3b82f6); color: white; box-shadow: 0 4px 0 #1d4ed8, 0 6px 10px rgba(0, 0, 0, 0.2); }
        .btn-blue:active { box-shadow: 0 1px 0 #1d4ed8, 0 2px 4px rgba(0, 0, 0, 0.15); }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-3 md:p-6 flex flex-col items-center justify-center min-h-screen">

    <div id="root" class="w-full max-w-7xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // 言語リソース (仕様書とV1構成に基づき、6日間・3段ヘッダー・7バフを完全復元)
        const i18n = {
            ja: {
                title: "POK＆ASバフシミュレーター",
                subtitle: "POK & AS Buff Simulator",
                exportImg: "画像保存",
                saveState: "保存",
                loadState: "読込:",
                reset: "リセット",
                pcView: "PC",
                mobileView: "Mobile",
                headerBuff: "King Buff",
                headerPOK: "POK",
                headerAS: "AS",
                days: ["Mon (Day 1)", "Tue (Day 2)", "Wed (Day 3)", "Thu (Day 4)", "Fri (Day 5)", "Sat (Day 6)"],
                eventsPOK: ["資源略奪者", "城パワーブースト", "脅威の撃破", "部隊能力ブースト", "冒険家能力ブースト", "終了"],
                eventsAS: ["領地開発", "研究の進展", "総員出動", "部隊の進歩", "英雄の進歩", "エネミークラッシャー"],
                buffs: [
                    { id: 'building', name: '発展の時期', type: 'tech', duration: 1, desc: '建築速度+20% (1日)', icon: '🔨' },
                    { id: 'science', name: '学びの土地', type: 'tech', duration: 1, desc: '研究速度+20% (1日)', icon: '🔬' },
                    { id: 'bountiful', name: '贅沢な王国', type: 'resource', duration: 1, desc: '資源収集+20% (1日)', icon: '🪵' },
                    { id: 'rapid', name: '迅速な特訓', type: 'military', duration: 3, desc: '特訓速度+20% (3日)', icon: '⚔️' },
                    { id: 'recruitment', name: '大規模招集', type: 'military', duration: 2, desc: '特訓量+10% (2日)', icon: '🛡️' },
                    { id: 'wartime', name: '戦時動員', type: 'military', duration: 7, desc: '収容所上限+20% (7日間)', icon: '⛺' },
                    { id: 'recovery', name: '導きの回復', type: 'recovery', duration: 1, desc: '負傷・死亡10%即時回復', icon: '❤️' }
                ],
                notes: [
                    "セルをタップして、指定曜日にバフを発動するシミュレーションが可能です。",
                    "バフの持続日数に応じて自動的にトレイル（バー）が描画され、王冠（👑）が発動日を示します。",
                    "戦時動員（7日間）などの長期間バフも、カレンダーの土曜日（Day 6）を上限としてクリップ表示されます。",
                    "スマートフォンで操作する場合は、横画面（ランドスケープ）でのご利用を強く推奨します。",
                    "20分間無操作状態が続くと、初期状態に自動リセットされます。"
                ],
                savePrompt: "保存する設定名を入力してください:",
                noSaves: "データなし"
            },
            en: {
                title: "POK & AS Buff Simulator",
                subtitle: "Interactive Optimization Tool",
                exportImg: "Save Image",
                saveState: "Save",
                loadState: "Load:",
                reset: "Reset",
                pcView: "PC",
                mobileView: "Mobile",
                headerBuff: "King Buff",
                headerPOK: "POK",
                headerAS: "AS",
                days: ["Mon (Day 1)", "Tue (Day 2)", "Wed (Day 3)", "Thu (Day 4)", "Fri (Day 5)", "Sat (Day 6)"],
                eventsPOK: ["Resource Raider", "Stronghold Power", "Defeat Threats", "Troop Ability", "Adventurer Ability", "Ended"],
                eventsAS: ["Estate Development", "Research Breakthrough", "Total Mobilization", "Troop Advancement", "Hero Advancement", "Enemy Crusher"],
                buffs: [
                    { id: 'building', name: 'Building Boom', type: 'tech', duration: 1, desc: 'Construction Speed +20% (1d)', icon: '🔨' },
                    { id: 'science', name: 'Age of Science', type: 'tech', duration: 1, desc: 'Research Speed +20% (1d)', icon: '🔬' },
                    { id: 'bountiful', name: 'Bountiful Kingdom', type: 'resource', duration: 1, desc: 'Gathering Speed +20% (1d)', icon: '🪵' },
                    { id: 'rapid', name: 'Rapid Training', type: 'military', duration: 3, desc: 'Train Speed +20% (3d)', icon: '⚔️' },
                    { id: 'recruitment', name: 'Recruitment Drive', type: 'military', duration: 2, desc: 'Train Capacity +10% (2d)', icon: '🛡️' },
                    { id: 'wartime', name: 'Wartime Draft', type: 'military', duration: 7, desc: 'Hospital Cap +20% (7d)', icon: '⛺' },
                    { id: 'recovery', name: 'Guided Recovery', type: 'recovery', duration: 1, desc: 'Recover 10% Troops (Inst)', icon: '❤️' }
                ],
                notes: [
                    "Tap a cell to simulate activating the King's Buff on that specific day.",
                    "Duration trails are automatically drawn, and the crown (👑) marks the activation day.",
                    "Long buffs like Wartime Draft (7d) are visually clipped to Saturday (Day 6) on this schedule.",
                    "Landscape mode is highly recommended for mobile users.",
                    "Inactivity for 20 minutes will trigger an automatic reset."
                ],
                savePrompt: "Enter a name for this save state:",
                noSaves: "No saves"
            }
        };

        const initialPlacements = {
            'bountiful': 2, // Wed (Day 3)
            'recovery': 3   // Thu (Day 4)
        };

        const typeStyles = {
            tech: { bgBase: 'bg-sky-50/70', bgGradient: 'linear-gradient(to right, rgba(56, 189, 248, 0.85), rgba(14, 165, 233, 0.85))', borderColor: '#0ea5e9', textColor: 'text-sky-900' },
            resource: { bgBase: 'bg-emerald-50/70', bgGradient: 'linear-gradient(to right, rgba(110, 231, 183, 0.85), rgba(16, 185, 129, 0.85))', borderColor: '#10b981', textColor: 'text-emerald-950' },
            military: { bgBase: 'bg-amber-50/70', bgGradient: 'linear-gradient(to right, rgba(253, 186, 116, 0.85), rgba(249, 115, 22, 0.85))', borderColor: '#f97316', textColor: 'text-amber-950' },
            recovery: { bgBase: 'bg-rose-50/70', bgGradient: 'linear-gradient(to right, rgba(252, 165, 165, 0.85), rgba(239, 68, 68, 0.85))', borderColor: '#ef4444', textColor: 'text-rose-950' }
        };

        const App = () => {
            const [lang, setLang] = useState('en');
            const [viewMode, setViewMode] = useState('pc');
            const [placements, setPlacements] = useState(initialPlacements);
            const [saves, setSaves] = useState([]);
            const timerRef = useRef(null);
            
            const t = i18n[lang];

            useEffect(() => {
                const loadedSaves = localStorage.getItem('pokas_buff_saves_v6');
                if (loadedSaves) {
                    try { setSaves(JSON.parse(loadedSaves)); } catch (e) { console.error(e); }
                }
            }, []);

            const resetInactivityTimer = useCallback(() => {
                if (timerRef.current) clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => {
                    setPlacements(initialPlacements);
                }, 20 * 60 * 1000);
            }, []);

            useEffect(() => {
                const events = ['mousemove', 'keydown', 'touchstart'];
                events.forEach(event => window.addEventListener(event, resetInactivityTimer));
                resetInactivityTimer();
                return () => {
                    events.forEach(event => window.removeEventListener(event, resetInactivityTimer));
                    if (timerRef.current) clearTimeout(timerRef.current);
                };
            }, [resetInactivityTimer]);

            // 王冠の動的追従：タップしたセルを開始日として保存
            const toggleBuff = (buffId, dayIndex) => {
                setPlacements(prev => {
                    const newPlacements = { ...prev };
                    if (newPlacements[buffId] === dayIndex) {
                        delete newPlacements[buffId];
                    } else {
                        newPlacements[buffId] = dayIndex;
                    }
                    return newPlacements;
                });
            };

            const handleSave = () => {
                const name = prompt(t.savePrompt);
                if (!name) return;
                const newSave = { id: Date.now(), name, data: placements };
                const newSaves = [...saves, newSave].slice(-5);
                setSaves(newSaves);
                localStorage.setItem('pokas_buff_saves_v6', JSON.stringify(newSaves));
            };

            const handleExport = async () => {
                const element = document.getElementById('simulator-card');
                if (element && window.html2canvas) {
                    try {
                        const canvas = await window.html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#d0ebff', borderRadius: '24px' });
                        const link = document.createElement('a');
                        link.download = `POK_AS_Buff_Simulation_${lang}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (error) { console.error(error); }
                }
            };

            return (
                <div id="simulator-card" className="w-full bg-[#e2f3ff] border-4 border-[#93cbf7] rounded-3xl p-4 md:p-6 shadow-[0_15px_35px_rgba(0,0,0,0.15)] relative overflow-hidden">
                    <div className="absolute top-2 left-4 text-sky-300 opacity-25 text-3xl select-none pointer-events-none">⭐</div>
                    <div className="absolute top-10 right-8 text-sky-300 opacity-25 text-4xl select-none pointer-events-none">👑</div>
                    <div className="absolute bottom-10 left-10 text-sky-300 opacity-25 text-4xl select-none pointer-events-none">⚔️</div>

                    <div className="flex flex-col lg:flex-row justify-between items-center mb-6 gap-4 relative z-10">
                        <div className="flex flex-col items-center lg:items-start">
                            <h1 className="text-2xl md:text-3xl font-black text-amber-500 tracking-wider text-center lg:text-left flex items-center gap-2" style={{ textShadow: '2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 4px 4px 6px rgba(0,0,0,0.15)' }}>
                                ⭐ {t.title} ⭐
                            </h1>
                            <span className="text-xs font-black text-sky-800 tracking-widest uppercase mt-0.5">{t.subtitle}</span>
                        </div>

                        <div className="flex flex-wrap items-center justify-center gap-3 bg-white/70 backdrop-blur-md px-4 py-2.5 rounded-2xl border-2 border-sky-200 shadow-sm">
                            <div className="flex bg-sky-200/50 p-1 rounded-full border border-sky-300">
                                <button onClick={() => setViewMode('pc')} className={`px-3 py-1 text-xs font-black rounded-full transition-all ${viewMode === 'pc' ? 'bg-white text-sky-800 shadow-sm' : 'text-sky-600 hover:text-sky-800'}`}>🖥️ {t.pcView}</button>
                                <button onClick={() => setViewMode('mobile')} className={`px-3 py-1 text-xs font-black rounded-full transition-all ${viewMode === 'mobile' ? 'bg-white text-sky-800 shadow-sm' : 'text-sky-600 hover:text-sky-800'}`}>📱 {t.mobileView}</button>
                            </div>
                            <button onClick={() => setLang(lang === 'ja' ? 'en' : 'ja')} className="btn-3d btn-blue text-xs px-3.5 py-1.5">🌐 {lang === 'ja' ? 'JA / EN' : 'EN / JA'}</button>
                            <button onClick={() => setPlacements(initialPlacements)} className="btn-3d btn-red text-xs px-3.5 py-1.5">🔄 {t.reset}</button>
                            <button onClick={handleSave} className="btn-3d btn-green text-xs px-3.5 py-1.5">💾 {t.saveState}</button>
                            <select className="px-3 py-1.5 bg-amber-50 border-2 border-amber-300 rounded-full outline-none font-bold text-xs text-amber-800 shadow-sm cursor-pointer hover:bg-amber-100" onChange={(e) => { const s = saves.find(s => s.id.toString() === e.target.value); if (s) setPlacements(s.data); e.target.value = ""; }} defaultValue="">
                                <option value="" disabled>{t.loadState} ({saves.length}/5)</option>
                                {saves.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                {saves.length === 0 && <option disabled>{t.noSaves}</option>}
                            </select>
                            <button onClick={handleExport} className="btn-3d btn-emerald text-xs px-3.5 py-1.5">🖼️ {t.exportImg}</button>
                        </div>
                    </div>

                    <div className="bg-white border-4 border-sky-300/60 rounded-2xl shadow-lg p-2.5 md:p-4 overflow-x-auto hide-scrollbar">
                        <table className="w-full border-collapse text-sm transition-all duration-200" style={{ tableLayout: 'fixed', minWidth: viewMode === 'pc' ? '1024px' : '768px' }}>
                            <colgroup>
                                <col style={{ width: '22%' }} />
                                {/* 6日間の均等列 */}
                                <col style={{ width: '13%' }} />
                                <col style={{ width: '13%' }} />
                                <col style={{ width: '13%' }} />
                                <col style={{ width: '13%' }} />
                                <col style={{ width: '13%' }} />
                                <col style={{ width: '13%' }} />
                            </colgroup>

                            <thead>
                                {/* 1行目: 曜日 */}
                                <tr>
                                    <th className="p-1">
                                        <div className="bg-gray-100 border-2 border-gray-300 rounded-xl py-2 px-1.5 text-center shadow-sm text-gray-700 font-extrabold text-xs">
                                            {t.headerBuff}
                                        </div>
                                    </th>
                                    {t.days.map((day, i) => (
                                        <th key={i} className="p-1">
                                            <div className="bg-sky-100/80 border-2 border-sky-300/50 rounded-xl py-2 px-1.5 text-center shadow-sm">
                                                <div className="text-sky-800 font-extrabold text-xs tracking-tight">{day}</div>
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                                
                                {/* 2行目: POK */}
                                <tr>
                                    <th className="p-1">
                                        <div className="bg-blue-50 border-2 border-blue-200 rounded-xl py-1.5 px-1 text-center shadow-sm text-blue-900 font-extrabold text-xs">
                                            {t.headerPOK}
                                        </div>
                                    </th>
                                    {t.eventsPOK.map((ev, i) => (
                                        <th key={i} className="p-1 align-middle">
                                            <div className="bg-blue-50/40 border-2 border-dashed border-blue-200 rounded-xl py-1.5 flex flex-col items-center justify-center min-h-[44px]">
                                                <span className="font-black text-[10px] md:text-xs leading-tight tracking-tighter text-blue-900 text-center">{ev}</span>
                                            </div>
                                        </th>
                                    ))}
                                </tr>

                                {/* 3行目: AS */}
                                <tr>
                                    <th className="p-1">
                                        <div className="bg-red-50 border-2 border-red-200 rounded-xl py-1.5 px-1 text-center shadow-sm text-red-900 font-extrabold text-xs">
                                            {t.headerAS}
                                        </div>
                                    </th>
                                    {t.eventsAS.map((ev, i) => (
                                        <th key={i} className="p-1 align-middle">
                                            <div className="bg-red-50/40 border-2 border-dashed border-red-200 rounded-xl py-1.5 flex flex-col items-center justify-center min-h-[44px]">
                                                <span className="font-black text-[10px] md:text-xs leading-tight tracking-tighter text-red-900 text-center">{ev}</span>
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>

                            <tbody>
                                <tr className="h-2"></tr>

                                {t.buffs.map((buff) => {
                                    const style = typeStyles[buff.type];
                                    const start = placements[buff.id];

                                    // 仕様書に基づく正確な日数計算（6列からはみ出さないようMath.minでクランプ）
                                    const isPlaced = start !== undefined;
                                    const activeDuration = isPlaced ? Math.min(buff.duration, 6 - start) : 0;

                                    return (
                                        <tr key={buff.id} className="group border-b-2 border-sky-100/50">
                                            {/* バフ名列 */}
                                            <td className={`p-2 transition-all rounded-l-2xl ${style.bgBase}`}>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-2xl filter drop-shadow">{buff.icon}</span>
                                                    <div className="leading-tight">
                                                        <div className={`font-black text-xs md:text-[13px] ${style.textColor}`}>{buff.name}</div>
                                                        <div className="text-[9px] md:text-[10px] text-slate-500 font-bold mt-0.5">{buff.desc}</div>
                                                    </div>
                                                </div>
                                            </td>

                                            {/* 6日分のセル生成 */}
                                            {Array.from({ length: 6 }).map((_, dayIndex) => {
                                                const isStartCell = isPlaced && start === dayIndex;
                                                
                                                return (
                                                    <td 
                                                        key={dayIndex}
                                                        className="p-1.5 relative cursor-pointer select-none transition-colors border-r border-sky-100 last:border-r-0"
                                                        onClick={() => toggleBuff(buff.id, dayIndex)}
                                                    >
                                                        <div className="w-full h-14 rounded-xl border-2 border-sky-200/30 group-hover:border-sky-300/40 bg-white/40 hover:bg-sky-50/50 transition-all flex items-center justify-center relative">
                                                            {!isPlaced && (
                                                                <div className="w-1.5 h-1.5 rounded-full bg-sky-200 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                                            )}
                                                        </div>

                                                        {/* 持続トレイルと王冠（動的追従） */}
                                                        {isStartCell && (
                                                            <div 
                                                                className="absolute top-1/2 left-3 -translate-y-1/2 h-10 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.15)] z-20 transition-all pointer-events-none"
                                                                style={{
                                                                    width: `calc(${activeDuration} * 100% - 12px)`,
                                                                    background: style.bgGradient,
                                                                    border: `2.5px solid ${style.borderColor}`,
                                                                }}
                                                            >
                                                                <div className="absolute top-0.5 left-4 right-4 h-1 bg-white/40 rounded-full"></div>
                                                                <div className="absolute inset-0 rounded-full shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)] pointer-events-none"></div>

                                                                {/* オフセット廃止：タップしたセル(start)の中央に常に王冠を配置 */}
                                                                <div 
                                                                    className="absolute flex items-center justify-center"
                                                                    style={{
                                                                        left: `calc( (100% / ${activeDuration}) / 2 )`,
                                                                        top: '50%',
                                                                        transform: 'translate(-50%, -50%)',
                                                                        width: '32px',
                                                                        height: '32px'
                                                                    }}
                                                                >
                                                                    <div className="rounded-full bg-white/95 w-8 h-8 shadow-md flex items-center justify-center border-2 border-amber-300 relative animate-bounce" style={{ animationDuration: '3s' }}>
                                                                        <span className="text-lg filter drop-shadow">👑</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    <div className="mt-6 bg-[#f0f9ff]/90 border-4 border-sky-200 rounded-2xl p-4 md:p-5 shadow-sm relative">
                        <div className="flex items-center justify-center gap-1.5 mb-3">
                            <span className="text-xl">📜</span>
                            <h3 className="font-black text-sm md:text-base text-sky-900 tracking-wider">Notes</h3>
                            <span className="text-xl">📜</span>
                        </div>
                        <ul className="space-y-2 text-[11px] md:text-xs text-sky-950 font-bold">
                            {t.notes.map((note, idx) => {
                                const icons = ["👉", "👑", "✂️", "📱", "🔒"];
                                return (
                                    <li key={idx} className="flex items-start gap-2 leading-relaxed">
                                        <span className="text-sm shrink-0">{icons[idx % icons.length]}</span>
                                        <span>{note}</span>
                                    </li>
                                );
                            })}
                        </ul>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
